name: hotel-aks-check-$(Date:yyyyMMdd)$(Rev:.r)

trigger: none
pr: none

parameters:
- name: serviceConnection
  displayName: Azure Service Connection Name
  type: string
  default: sc-azure-terraform

- name: clusterResourceGroup
  displayName: AKS Resource Group
  type: string
  default: rg-microservices-dev-cin-dpu6

- name: clusterName
  displayName: AKS Cluster Name
  type: string
  default: aks-microservices-dev-cin-dpu6

- name: nodePoolName
  displayName: AKS User Node Pool Name
  type: string
  default: user

- name: nodePoolDesiredCount
  displayName: User Node Pool Desired Node Count
  type: number
  default: 2

- name: nodePoolMinCount
  displayName: User Node Pool Min Count
  type: number
  default: 2

- name: nodePoolMaxCount
  displayName: User Node Pool Max Count
  type: number
  default: 5

- name: scaleNodePool
  displayName: Scale user node pool before validation
  type: boolean
  default: true

- name: namespace
  displayName: Kubernetes Namespace
  type: string
  default: hotel-res

variables:
- name: ACR_LOGIN_SERVER
  value: microservicesdevcindpu6.azurecr.io
- name: ACR_NAME
  value: microservicesdevcindpu6
- name: AKS_FQDN
  value: dns-microservices-dev-cin-dpu6-wpje318p.hcp.centralindia.azmk8s.io
- name: AKS_ID
  value: /subscriptions/d4f8a684-0209-4748-b23f-67899b0539bb/resourceGroups/rg-microservices-dev-cin-dpu6/providers/Microsoft.ContainerService/managedClusters/aks-microservices-dev-cin-dpu6
- name: AKS_NAME
  value: aks-microservices-dev-cin-dpu6
- name: AKS_NODE_RESOURCE_GROUP
  value: MC_rg-microservices-dev-cin-dpu6_aks-microservices-dev-cin-dpu6_centralindia
- name: AKS_OIDC_ISSUER_URL
  value: https://centralindia.oic.prod-aks.azure.com/bb7cfe3b-bc9c-4d54-80b3-2ae61dd8358d/7a447bac-4f37-441a-be95-c543b88d9d9f/
- name: AKS_SUBNET_ID
  value: /subscriptions/d4f8a684-0209-4748-b23f-67899b0539bb/resourceGroups/rg-microservices-dev-cin-dpu6/providers/Microsoft.Network/virtualNetworks/vnet-microservices-dev-cin-dpu6/subnets/snet-aks
- name: LOCATION
  value: centralindia
- name: RESOURCE_GROUP_NAME
  value: rg-microservices-dev-cin-dpu6
- name: VNET_NAME
  value: vnet-microservices-dev-cin-dpu6

stages:
- stage: CheckHotelReservation
  displayName: Check HotelReservation on AKS
  jobs:
  - job: Check
    displayName: Validate service, pods, and endpoint
    pool:
      vmImage: ubuntu-latest
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: Run AKS validation script
      inputs:
        azureSubscription: ${{ parameters.serviceConnection }}
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail

          az aks nodepool list \
            --resource-group "${{ parameters.clusterResourceGroup }}" \
            --cluster-name "${{ parameters.clusterName }}" \
            -o table

          NODEPOOL_NAME="${{ parameters.nodePoolName }}"
          if [[ -n "$NODEPOOL_NAME" ]]; then
            if ! az aks nodepool show \
              --resource-group "${{ parameters.clusterResourceGroup }}" \
              --cluster-name "${{ parameters.clusterName }}" \
              --name "$NODEPOOL_NAME" >/dev/null 2>&1; then
              echo "##vso[task.logissue type=warning]Node pool '$NODEPOOL_NAME' not found. Auto-detecting a user pool."
              NODEPOOL_NAME=""
            fi
          fi

          if [[ -z "$NODEPOOL_NAME" ]]; then
            NODEPOOL_NAME="$(az aks nodepool list \
              --resource-group "${{ parameters.clusterResourceGroup }}" \
              --cluster-name "${{ parameters.clusterName }}" \
              --query "[?mode=='User'].name | [0]" -o tsv)"
          fi

          if [[ -z "$NODEPOOL_NAME" ]]; then
            echo "##vso[task.logissue type=error]No user node pool found to scale."
            exit 1
          fi

          echo "Using node pool: $NODEPOOL_NAME"

          SCALE_NODEPOOL="${{ parameters.scaleNodePool }}"
          echo "scaleNodePool=$SCALE_NODEPOOL"
          if [[ "${SCALE_NODEPOOL,,}" == "true" ]]; then
            DESIRED_COUNT="${{ parameters.nodePoolDesiredCount }}"
            TARGET_MIN_COUNT="${{ parameters.nodePoolMinCount }}"
            if [[ "$DESIRED_COUNT" -gt "$TARGET_MIN_COUNT" ]]; then
              TARGET_MIN_COUNT="$DESIRED_COUNT"
            fi

            az aks nodepool update \
              --resource-group "${{ parameters.clusterResourceGroup }}" \
              --cluster-name "${{ parameters.clusterName }}" \
              --name "$NODEPOOL_NAME" \
              --enable-cluster-autoscaler \
              --min-count "$TARGET_MIN_COUNT" \
              --max-count "${{ parameters.nodePoolMaxCount }}"

            SCALE_TIMEOUT_MINUTES=15
            SCALE_WAIT_SECONDS=20
            MAX_ATTEMPTS=$((SCALE_TIMEOUT_MINUTES * 60 / SCALE_WAIT_SECONDS))

            for _ in $(seq 1 "$MAX_ATTEMPTS"); do
              CURRENT_COUNT="$(az aks nodepool show \
                --resource-group "${{ parameters.clusterResourceGroup }}" \
                --cluster-name "${{ parameters.clusterName }}" \
                --name "$NODEPOOL_NAME" \
                --query "count" -o tsv)"
              PROVISIONING_STATE="$(az aks nodepool show \
                --resource-group "${{ parameters.clusterResourceGroup }}" \
                --cluster-name "${{ parameters.clusterName }}" \
                --name "$NODEPOOL_NAME" \
                --query "provisioningState" -o tsv)"

              if [[ -n "$CURRENT_COUNT" && "$CURRENT_COUNT" -ge "$TARGET_MIN_COUNT" && "$PROVISIONING_STATE" == "Succeeded" ]]; then
                echo "Node pool scaled to $CURRENT_COUNT nodes."
                break
              fi

              echo "Waiting for node pool to scale (current=$CURRENT_COUNT, min=$TARGET_MIN_COUNT, state=$PROVISIONING_STATE)..."
              sleep "$SCALE_WAIT_SECONDS"
            done

            if [[ -z "$CURRENT_COUNT" || "$CURRENT_COUNT" -lt "$TARGET_MIN_COUNT" ]]; then
              echo "##vso[task.logissue type=error]Node pool did not scale to desired count in time."
              exit 1
            fi
          fi
          chmod +x scripts/check-hotel-aks.sh
          ./scripts/check-hotel-aks.sh \
            "${{ parameters.clusterResourceGroup }}" \
            "${{ parameters.clusterName }}" \
            "${{ parameters.namespace }}"

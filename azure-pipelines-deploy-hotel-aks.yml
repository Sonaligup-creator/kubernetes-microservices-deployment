name: hotel-aks-deploy-$(Date:yyyyMMdd)$(Rev:.r)

trigger: none
pr: none

parameters:
- name: serviceConnection
  displayName: Azure Service Connection Name
  type: string
  default: sc-azure-terraform

- name: clusterResourceGroup
  displayName: AKS Resource Group
  type: string
  default: rg-microservices-dev-cin-dpu6

- name: clusterName
  displayName: AKS Cluster Name
  type: string
  default: aks-microservices-dev-cin-dpu6

- name: nodePoolName
  displayName: AKS User Node Pool Name
  type: string
  default: user

- name: nodePoolDesiredCount
  displayName: User Node Pool Desired Node Count
  type: number
  default: 2

- name: nodePoolMinCount
  displayName: User Node Pool Min Count
  type: number
  default: 2

- name: nodePoolMaxCount
  displayName: User Node Pool Max Count
  type: number
  default: 5

- name: scaleNodePool
  displayName: Scale user node pool before deploy
  type: boolean
  default: true

- name: namespace
  displayName: Kubernetes Namespace
  type: string
  default: hotel-res

- name: domainName
  displayName: Domain (optional, e.g. app.example.com)
  type: string
  default: "hotelreservationweb.me"

variables:
- name: ACR_LOGIN_SERVER
  value: microservicesdevcindpu6.azurecr.io
- name: ACR_NAME
  value: microservicesdevcindpu6
- name: AKS_FQDN
  value: dns-microservices-dev-cin-dpu6-wpje318p.hcp.centralindia.azmk8s.io
- name: AKS_ID
  value: /subscriptions/d4f8a684-0209-4748-b23f-67899b0539bb/resourceGroups/rg-microservices-dev-cin-dpu6/providers/Microsoft.ContainerService/managedClusters/aks-microservices-dev-cin-dpu6
- name: AKS_NAME
  value: aks-microservices-dev-cin-dpu6
- name: AKS_NODE_RESOURCE_GROUP
  value: MC_rg-microservices-dev-cin-dpu6_aks-microservices-dev-cin-dpu6_centralindia
- name: AKS_OIDC_ISSUER_URL
  value: https://centralindia.oic.prod-aks.azure.com/bb7cfe3b-bc9c-4d54-80b3-2ae61dd8358d/7a447bac-4f37-441a-be95-c543b88d9d9f/
- name: AKS_SUBNET_ID
  value: /subscriptions/d4f8a684-0209-4748-b23f-67899b0539bb/resourceGroups/rg-microservices-dev-cin-dpu6/providers/Microsoft.Network/virtualNetworks/vnet-microservices-dev-cin-dpu6/subnets/snet-aks
- name: LOCATION
  value: centralindia
- name: RESOURCE_GROUP_NAME
  value: rg-microservices-dev-cin-dpu6
- name: VNET_NAME
  value: vnet-microservices-dev-cin-dpu6

stages:
- stage: DeployHotelReservation
  displayName: Deploy HotelReservation to AKS
  jobs:
  - job: Deploy
    displayName: Apply Kubernetes manifests and expose frontend
    pool:
      vmImage: ubuntu-latest
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: Connect AKS and deploy manifests
      inputs:
        azureSubscription: ${{ parameters.serviceConnection }}
        addSpnToEnvironment: true
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail

          az aks nodepool list \
            --resource-group "${{ parameters.clusterResourceGroup }}" \
            --cluster-name "${{ parameters.clusterName }}" \
            -o table

          NODEPOOL_NAME="${{ parameters.nodePoolName }}"
          if [[ -n "$NODEPOOL_NAME" ]]; then
            if ! az aks nodepool show \
              --resource-group "${{ parameters.clusterResourceGroup }}" \
              --cluster-name "${{ parameters.clusterName }}" \
              --name "$NODEPOOL_NAME" >/dev/null 2>&1; then
              echo "##vso[task.logissue type=warning]Node pool '$NODEPOOL_NAME' not found. Auto-detecting a user pool."
              NODEPOOL_NAME=""
            fi
          fi

          if [[ -z "$NODEPOOL_NAME" ]]; then
            NODEPOOL_NAME="$(az aks nodepool list \
              --resource-group "${{ parameters.clusterResourceGroup }}" \
              --cluster-name "${{ parameters.clusterName }}" \
              --query "[?mode=='User'].name | [0]" -o tsv)"
          fi

          if [[ -z "$NODEPOOL_NAME" ]]; then
            echo "##vso[task.logissue type=error]No user node pool found to scale."
            exit 1
          fi

          echo "Using node pool: $NODEPOOL_NAME"

          if [[ "${{ parameters.scaleNodePool }}" == "true" ]]; then
            az aks nodepool update \
              --resource-group "${{ parameters.clusterResourceGroup }}" \
              --cluster-name "${{ parameters.clusterName }}" \
              --name "$NODEPOOL_NAME" \
              --enable-cluster-autoscaler \
              --min-count "${{ parameters.nodePoolMinCount }}" \
              --max-count "${{ parameters.nodePoolMaxCount }}"

            az aks nodepool scale \
              --resource-group "${{ parameters.clusterResourceGroup }}" \
              --cluster-name "${{ parameters.clusterName }}" \
              --name "$NODEPOOL_NAME" \
              --node-count "${{ parameters.nodePoolDesiredCount }}"
          fi

          az aks get-credentials \
            --resource-group "${{ parameters.clusterResourceGroup }}" \
            --name "${{ parameters.clusterName }}" \
            --overwrite-existing

          kubectl create namespace "${{ parameters.namespace }}" --dry-run=client -o yaml | kubectl apply -f -

          kubectl apply -R -f "$(Build.SourcesDirectory)/hotelReservation/kubernetes" -n "${{ parameters.namespace }}"

          # Keep internal frontend service as-is and create a dedicated public LB service on port 80.
          cat <<'EOF' | kubectl apply -n "${{ parameters.namespace }}" -f -
          apiVersion: v1
          kind: Service
          metadata:
            name: frontend-public
          spec:
            type: LoadBalancer
            selector:
              io.kompose.service: frontend
            ports:
            - name: http
              port: 80
              targetPort: 5000
          EOF

          echo "Waiting for frontend external endpoint..."
          FRONTEND_IP=""
          FRONTEND_HOSTNAME=""

          for _ in $(seq 1 60); do
            FRONTEND_IP="$(kubectl get service frontend-public -n "${{ parameters.namespace }}" -o jsonpath='{.status.loadBalancer.ingress[0].ip}' || true)"
            FRONTEND_HOSTNAME="$(kubectl get service frontend-public -n "${{ parameters.namespace }}" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' || true)"

            if [[ -n "$FRONTEND_IP" || -n "$FRONTEND_HOSTNAME" ]]; then
              break
            fi

            sleep 10
          done

          if [[ -n "$FRONTEND_IP" ]]; then
            FRONTEND_ENDPOINT="$FRONTEND_IP"
          else
            FRONTEND_ENDPOINT="$FRONTEND_HOSTNAME"
          fi

          if [[ -z "$FRONTEND_ENDPOINT" ]]; then
            echo "##vso[task.logissue type=error]Frontend LoadBalancer endpoint was not assigned in time."
            exit 1
          fi

          echo "##vso[task.setvariable variable=FRONTEND_ENDPOINT]$FRONTEND_ENDPOINT"
          echo "Frontend endpoint: $FRONTEND_ENDPOINT"

    - bash: |
        set -euo pipefail
        echo "Deployment completed."
        echo "Public app endpoint: http://$(FRONTEND_ENDPOINT)"

        if [[ -n "${{ parameters.domainName }}" ]]; then
          echo "Map DNS for your domain:"
          echo "  Host: ${{ parameters.domainName }}"
          echo "  Target: $(FRONTEND_ENDPOINT)"
          echo "  Type: A record (if endpoint is IP) or CNAME (if endpoint is hostname)"
          echo "After DNS propagation, open: http://${{ parameters.domainName }}"
        else
          echo "No domainName provided. Add an A record to point your domain to $(FRONTEND_ENDPOINT)."
        fi
      displayName: Print endpoint and domain mapping info